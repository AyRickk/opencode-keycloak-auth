name: Release

# On every version tag, build the plugin and attach a ready-to-use artifact to
# the GitHub Release — no local `npm install && npm run build` needed by users.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Build plugin
        run: npm run build

      - name: Assemble release artifacts
        run: |
          # (1) Self-contained ESM bundle — drop straight into
          #     ~/.config/opencode/plugins/ (OpenCode auto-loads it). Zero runtime deps.
          cp dist/index.js opencode-keycloak-auth.js
          # (2) Vendored tarball (dist + README + package.json) for `npm install ./*.tgz`.
          npm pack

      - name: Create or update the release with the built plugin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSETS=(opencode-keycloak-auth.js opencode-keycloak-auth-*.tgz)
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" --title "$TAG" --generate-notes "${ASSETS[@]}"
          fi
